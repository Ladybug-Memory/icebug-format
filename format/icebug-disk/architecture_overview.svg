<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" width="100%" height="auto">
  <defs>
    <style>
      .box { fill: #ebf8ff; stroke: #3182ce; stroke-width: 2; rx: 8; ry: 8; }
      .box-green { fill: #f0fff4; stroke: #38a169; stroke-width: 2; rx: 8; ry: 8; }
      .box-purple { fill: #faf5ff; stroke: #805ad5; stroke-width: 2; rx: 8; ry: 8; }
      .text-title { font-family: 'Segoe UI', Helvetica, sans-serif; font-weight: bold; font-size: 14px; fill: #2b6cb0; }
      .text-green-title { font-family: 'Segoe UI', Helvetica, sans-serif; font-weight: bold; font-size: 14px; fill: #276749; }
      .text-purple-title { font-family: 'Segoe UI', Helvetica, sans-serif; font-weight: bold; font-size: 14px; fill: #553c9a; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" rx="12" ry="12"/>

  <!-- Components -->
  <rect class="box" x="10" y="110" width="160" height="80" />
  <rect class="box" x="15" y="115" width="160" height="80" />
  <rect class="box" x="20" y="120" width="160" height="80" />
  <text class="text-title" x="100" y="160" text-anchor="middle" dominant-baseline="middle">Initialization Files</text>

  <rect class="box-green" x="210" y="110" width="160" height="80" />
  <rect class="box-green" x="215" y="115" width="160" height="80" />
  <rect class="box-green" x="220" y="120" width="160" height="80" />
  <text class="text-green-title" x="300" y="160" text-anchor="middle" dominant-baseline="middle">Node Tables</text>

  <rect class="box-purple" x="410" y="110" width="160" height="80" />
  <rect class="box-purple" x="415" y="115" width="160" height="80" />
  <rect class="box-purple" x="420" y="120" width="160" height="80" />
  <text class="text-purple-title" x="500" y="160" text-anchor="middle" dominant-baseline="middle">Indices Files</text>

  <rect class="box-purple" x="610" y="110" width="160" height="80" />
  <rect class="box-purple" x="615" y="115" width="160" height="80" />
  <rect class="box-purple" x="620" y="120" width="160" height="80" />
  <text class="text-purple-title" x="700" y="160" text-anchor="middle" dominant-baseline="middle">Indptr Files</text>

</svg>
