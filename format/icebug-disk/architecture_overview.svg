<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" width="100%" height="auto">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#718096" />
    </marker>
    <style>
      .box { fill: #ebf8ff; stroke: #3182ce; stroke-width: 2; rx: 8; ry: 8; }
      .box-green { fill: #f0fff4; stroke: #38a169; stroke-width: 2; rx: 8; ry: 8; }
      .box-purple { fill: #faf5ff; stroke: #805ad5; stroke-width: 2; rx: 8; ry: 8; }
      .text-title { font-family: 'Segoe UI', Helvetica, sans-serif; font-weight: bold; font-size: 14px; fill: #2b6cb0; }
      .text-green-title { font-family: 'Segoe UI', Helvetica, sans-serif; font-weight: bold; font-size: 14px; fill: #276749; }
      .text-purple-title { font-family: 'Segoe UI', Helvetica, sans-serif; font-weight: bold; font-size: 14px; fill: #553c9a; }
      .line { stroke: #718096; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" rx="12" ry="12"/>

  <!-- Top layer: Metadata and Init Script -->
  <rect class="box" x="220" y="40" width="160" height="70" />
  <text class="text-title" x="300" y="75" text-anchor="middle" dominant-baseline="middle">Metadata File</text>

  <rect class="box" x="420" y="40" width="160" height="70" />
  <text class="text-title" x="500" y="75" text-anchor="middle" dominant-baseline="middle">Init Script</text>

  <!-- Flow Sequence Layer -->
  <rect class="box-purple" x="10" y="170" width="160" height="80" />
  <rect class="box-purple" x="15" y="175" width="160" height="80" />
  <rect class="box-purple" x="20" y="180" width="160" height="80" />
  <text class="text-purple-title" x="100" y="220" text-anchor="middle" dominant-baseline="middle">Internal ID Mappings</text>

  <rect class="box-green" x="210" y="170" width="160" height="80" />
  <rect class="box-green" x="215" y="175" width="160" height="80" />
  <rect class="box-green" x="220" y="180" width="160" height="80" />
  <text class="text-green-title" x="300" y="220" text-anchor="middle" dominant-baseline="middle">Node Tables</text>

  <rect class="box-purple" x="410" y="170" width="160" height="80" />
  <rect class="box-purple" x="415" y="175" width="160" height="80" />
  <rect class="box-purple" x="420" y="180" width="160" height="80" />
  <text class="text-purple-title" x="500" y="220" text-anchor="middle" dominant-baseline="middle">Edge Ranges</text>

  <rect class="box-green" x="610" y="170" width="160" height="80" />
  <rect class="box-green" x="615" y="175" width="160" height="80" />
  <rect class="box-green" x="620" y="180" width="160" height="80" />
  <text class="text-green-title" x="700" y="220" text-anchor="middle" dominant-baseline="middle">Relationship Tables</text>

  <!-- Arrows -->
  <line class="line" x1="180" y1="220" x2="200" y2="220" />
  <line class="line" x1="380" y1="220" x2="400" y2="220" />
  <line class="line" x1="580" y1="220" x2="600" y2="220" />

</svg>
